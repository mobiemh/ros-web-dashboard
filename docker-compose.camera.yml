# 카메라(WebRTC) 스택 — Gazebo 가상 로봇 + aiortc 브리지.
#
#   docker compose -f docker-compose.camera.yml up --build
#
# 두 컨테이너가 같은 Docker 네트워크에서 ROS 2 DDS 로 통신한다(같은 Humble → 깨끗한 interop).
#   sim           : Gazebo waffle_pi → /camera/image_raw, /odom, /scan 발행
#   camera-bridge : /camera/image_raw 구독 → WebRTC 로 브라우저에 스트리밍(:8080/webrtc)
#
# 브라우저에서 대시보드(rosbridge/backend 모드)를 열면 CameraView 가 :8080 에 붙는다.
#
# [Windows Docker Desktop 주의] 컨테이너→Windows 브라우저의 WebRTC 미디어(UDP)는
# 컨테이너 내부 IP 를 ICE 후보로 광고해 브라우저가 못 닿을 수 있다. 로컬에서 실제로
# "영상을 보는" 검증은 WSL 직결 경로(카메라브리지를 WSL 에서 실행)가 확실하다 —
# ARCHITECTURE.md 의 카메라 섹션 참고. Linux 호스트에서는 network_mode: host 로 매끄럽다.

services:
  sim:
    build:
      context: ./camera-bridge
      dockerfile: sim.Dockerfile
    container_name: ros-dashboard-sim
    environment:
      - ROS_DOMAIN_ID=0
    # DDS 멀티캐스트 디스커버리를 위해 같은 네트워크 공유(compose 기본 네트워크로 충분)

  # 텔레메트리(/odom·/scan) + 제어(/cmd_vel) 중계. 대시보드 rosbridge 모드가 여기(:9090)에 붙는다.
  rosbridge:
    build:
      context: ./camera-bridge
      dockerfile: rosbridge.Dockerfile
    container_name: ros-dashboard-rosbridge
    depends_on:
      - sim
    environment:
      - ROS_DOMAIN_ID=0
    ports:
      - "9090:9090"

  camera-bridge:
    build:
      context: ./camera-bridge
      dockerfile: Dockerfile
    image: ros-dashboard/camera-bridge:latest
    container_name: ros-dashboard-camera-bridge
    depends_on:
      - sim
    environment:
      - ROS_DOMAIN_ID=0
      - CAMERA_TOPIC=/camera/image_raw
      - BRIDGE_PORT=8080
      # WebRTC 미디어(UDP)를 고정 포트로 + 브라우저가 닿는 IP(127.0.0.1)로 후보 치환
      # → Windows Docker Desktop 에서도 컨테이너로 미디어 UDP 가 들어온다.
      - WEBRTC_UDP_PORT=50000
      - WEBRTC_PUBLIC_IP=127.0.0.1
      - DEBUG_ICE=1            # ICE 협상 상세 로그(디버그용, 원인 파악 후 제거)
      - PYTHONUNBUFFERED=1
    ports:
      - "8080:8080"          # 시그널링/health (TCP)
      - "50000:50000/udp"    # WebRTC 미디어 (UDP) — 고정 포트 퍼블리시
